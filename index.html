<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>movieflex</title>
  <!-- 구글 폰트 사용 -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img class="main-img" src="Img/mainImg.png" alt="메인 이미지">
    <div class="logo">movie flex</div>
    <div class="auth-buttons">
      <button class="signIn-btn">로그인</button>
      <button class="signUp-btn">회원가입</button>
    </div>
  </header>
  <section>
    <div class="main-text">영화가 보고싶을 땐, 무비 플렉스</div>
    <div class="main-text2">찾으시는 영화가 있으신가요? 영화는 역시 무비 플렉스에서</div>
    <div class="search-box">
      <form action="https://www.google.com/search" method="GET" target="_blank">
        <input type="text" name="q" class="search-input" placeholder="영화 제목을 입력하세요">
        <button type="submit" class="search-btn">검색</button>
      </form>
    </div>
  </section>
  <footer>
    <div class="footer-text">MOVIEFLEX © 2025 | 영화와 함께하는 즐거운 시간</div>
    <div class="footer-text2">
      <span class="footer-bold">SOONGSIL UNIVERSITY</span>
    </div>
    <div class="footer-text2">Assignment - 자유로운 주제로 홈페이지 만들기</div>
    <div class="footer-text2">학번-20254069 | 이름-서병준 | 제출일자-2025.06.16 | email-hijun8080@gmail.com</div>
    <br>
  </footer>
