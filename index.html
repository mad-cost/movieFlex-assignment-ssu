<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>movieflex</title>
  <!-- 구글 폰트 사용 -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img class="main-img" src="Img/mainImg.png" alt="메인 이미지">
    <div class="logo">movie flex</div>
    <div class="auth-buttons">
      <button class="signIn-btn">로그인</button>
      <button class="signUp-btn">회원가입</button>
    </div>
  </header>

  <section>
    <div class="main-text">영화가 보고싶을 땐, 무비 플렉스</div>
    <div class="main-text2">찾으시는 영화가 있으신가요? 영화는 역시 무비 플렉스에서</div>
    <div class="search-box">
      <form action="https://www.google.com/search" method="GET" target="_blank">
        <input type="text" name="q" class="search-input" placeholder="영화 제목을 입력하세요">
        <button type="submit" class="search-btn">검색</button>
      </form>
    </div>
  </section>

  <section2>
  <div class="main-text3">인기 Top 7</div>
    <div class="slider-container">
        <button class="slide-btn left">&lt;</button>
        <ul class="best-list">
            <li><span>1</span><img src="Img/Top7/topImg1.png" alt="인기 이미지1"></li>
            <li><span>2</span><img src="Img/Top7/topImg2.png" alt="인기 이미지2"></li>
            <li><span>3</span><img src="Img/Top7/topImg3.png" alt="인기 이미지3"></li>
            <li><span>4</span><img src="Img/Top7/topImg4.png" alt="인기 이미지4"></li>
            <li><span>5</span><img src="Img/Top7/topImg5.png" alt="인기 이미지5"></li>
            <li><span>6</span><img src="Img/Top7/topImg6.png" alt="인기 이미지6"></li>
            <li><span>7</span><img src="Img/Top7/topImg7.png" alt="인기 이미지7"></li>
        </ul>
        <button class="slide-btn right">&gt;</button>
    </div>
    <script src="js/slide-btn.js"></script>
  </div>
  </section2>

  <footer>
    <div class="footer-text">MOVIE FLEX © 2025 | 영화와 함께하는 즐거운 시간</div>
    <div class="footer-text2">
      <span class="footer-bold">SOONGSIL UNIVERSITY</span>
    </div>
    <div class="footer-text2">Assignment - 자유로운 주제로 홈페이지 만들기</div>
    <div class="footer-text2">학번-20254069 | 이름-서병준 | 제출일자-2025.06.16 | email-hijun8080@gmail.com</div>
    <br>
  </footer>
</body>
</html>
