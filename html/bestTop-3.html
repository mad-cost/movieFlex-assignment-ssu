<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>movieflex</title>
  <!-- 구글 폰트 사용 -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bestPage.css">
</head>
<body>
  <header>
    <a href="../index.html" class="logo">movie flex</a>
    <div class="auth-buttons">
      <a href="html/signIn.html"><button class="signIn-btn">로그인</button></a>
      <a href="html/signUp.html"><button class="signUp-btn">회원가입</button></a>
    </div>
  </header>

  <section class="movie-container">
    <div class="movie-info">
      <h2 class="movie-title">너의이름은</h2>
      <div class="sub-info">
        <span>2016 · 1시간 46분 · 애니메이션 · OST</span>
      </div>
      <p class="description">
        도쿄에 사는 타키와 시골에 사는 미츠하는 어느 날 서로의 영혼이 바뀐 채 하루를 사는 신기한 일을 경험한다.
        두 사람은 계속해서 반복되는 바뀜 속에 서로가 특별하게 이어져 있다는 것을 깨닫는다.
      </p>
      <div class="status">
        <div>⭐ 평점 | 4.0</div>
        <div>✏️ 4점 이상 평가 | 70%</div>
        <div>♥️ 보고싶어요 | 54.5K</div>
      </div>
      <div class="buttons">
        <button>구매하기</button>
        <button>찜해두기</button>
      </div>
    </div>

    <div class="movie-poster">
      <img src="../Img/Top7/top3sub.png" alt="너의이름은 포스터" />
    </div>
  </section>
</body>
</html>
