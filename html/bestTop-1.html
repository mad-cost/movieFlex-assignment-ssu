<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>movieflex</title>
  <!-- 구글 폰트 사용 -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/bestPage.css">
</head>
<body>
  <header>
    <a href="../index.html" class="logo">movie flex</a>
    <div class="auth-buttons">
      <a href="/html/signIn.html"><button class="signIn-btn">로그인</button></a>
      <a href="/html/signUp.html"><button class="signUp-btn">회원가입</button></a>
    </div>
  </header>

  <section class="movie-container">
    <div class="movie-info">
      <h2 class="movie-title">기생충</h2>
      <div class="sub-info">
        <span>2019 · 2시간 11분 · 드라마 · 풍자적인</span>
      </div>
      <p class="description">
        전원 백수로 살 길이 막막하지만 사이는 좋은 기택 가족. 장남 기우에게 명문대생 친구 민혁이 연결해 준 고액 과외는 모처럼 싹튼 고정 수입의 희망이다.
        기우는 온 가족의 기대 속에 박 사장 집으로 향한다.
      </p>
      <div class="status">
        <div>⭐ 평점 | 4.3</div>
        <div>✏️ 4점 이상 평가 | 70%</div>
        <div>♥️ 보고싶어요 | 96.6K</div>
        <br>
      </div>
      <div class="buttons">
        <button>구매하기</button>
        <button>찜해두기</button>
      </div>
    </div>

    <div class="movie-poster">
      <img src="/Img/Top7/top1sub.png" alt="기생충 포스터" />
    </div>
  </section>
</body>
</html>
