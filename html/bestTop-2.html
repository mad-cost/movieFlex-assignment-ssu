<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>movieflex</title>
  <!-- 구글 폰트 사용 -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bestPage.css">
</head>
<body>
  <header>
    <a href="../index.html" class="logo">movie flex</a>
    <div class="auth-buttons">
      <a href="html/signIn.html"><button class="signIn-btn">로그인</button></a>
      <a href="html/signUp.html"><button class="signUp-btn">회원가입</button></a>
    </div>
  </header>

  <section class="movie-container">
    <div class="movie-info">
      <h2 class="movie-title">드래곤 길들이기3</h2>
      <div class="sub-info">
        <span>2019 · 1시간 44분 · 애니메이션 · 드림웍스</span>
      </div>
      <p class="description">
        버크섬을 지키던 히컵과 투슬리스는 악랄한 드래곤 헌터 그리멜을 피해 사람들을 이끌고 히든 월드로 향한다.
        미지의 세계에 대한 단서를 찾던 히컵과 투슬리스는 숲에서 또 다른 드래곤 라이트 퓨리를 만난다.
      </p>
      <div class="status">
        <div>⭐ 평점 | 3.7</div>
        <div>✏️ 4점 이상 평가 | 55%</div>
        <div>♥️ 보고싶어요 | 5.2K</div>
      </div>
      <div class="buttons">
        <button>구매하기</button>
        <button>찜해두기</button>
      </div>
    </div>

    <div class="movie-poster">
      <img src="../Img/Top7/top2sub.png" alt="드래곤 길들이기3 포스터" />
    </div>
  </section>
</body>
</html>
